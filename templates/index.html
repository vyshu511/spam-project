<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector - AI Powered Email Classification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 650px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .examples {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .examples p {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            background: #e9ecef;
            color: #495057;
            padding: 8px 15px;
            font-size: 12px;
            width: auto;
            font-weight: normal;
        }
        
        .example-btn:hover {
            background: #dee2e6;
            transform: none;
            box-shadow: none;
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.spam {
            background: linear-gradient(135deg, #fee 0%, #fdd 100%);
            border: 2px solid #dc3545;
        }
        
        .result.ham {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 2px solid #28a745;
        }
        
        .result-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .result.spam .result-title {
            color: #dc3545;
        }
        
        .result.ham .result-title {
            color: #28a745;
        }
        
        .confidence-bar {
            background: white;
            height: 10px;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .confidence-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        
        .message-preview {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .message-preview-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .message-preview-text {
            color: #333;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .stats {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .result-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📧</span>
                <span>Spam Detector</span>
                <span>🤖</span>
            </h1>
            <p>AI-powered message classification using Machine Learning</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label>📝 Enter your message:</label>
                <textarea id="message" rows="5" placeholder="Type or paste a message here..."></textarea>
            </div>
            
            <button id="detectBtn" onclick="detectSpam()">🔍 Detect Spam</button>
            
            <div class="examples">
                <p>💡 Try these examples:</p>
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExample('Congratulations! You won $1,000,000! Click here to claim your prize now!')">
                        🚨 Spam Example
                    </button>
                    <button class="example-btn" onclick="setExample('Hey, are we still meeting for coffee tomorrow at 3pm? Let me know!')">
                        ✅ Ham Example
                    </button>
                    <button class="example-btn" onclick="setExample('Your invoice #INV-2024-001 has been generated. Amount: $49.99')">
                        📄 Neutral Example
                    </button>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Analyzing message...</p>
            </div>
            
            <div class="error-message" id="error"></div>
            
            <div class="result" id="result"></div>
            
            <div class="stats">
                🧠 Trained on 28 messages | 📊 Vocabulary: 150+ words | 🎯 Accuracy: ~85%
            </div>
        </div>
    </div>
    
    <script>
        async function detectSpam() {
            const message = document.getElementById('message').value.trim();
            
            if (!message) {
                showError('Please enter a message to analyze');
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('detectBtn').disabled = true;
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `message=${encodeURIComponent(message)}`
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResult(data);
                } else {
                    showError(data.error || 'Something went wrong');
                }
            } catch (error) {
                showError('Network error. Please try again.');
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('detectBtn').disabled = false;
            }
        }
        
        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            const isSpam = data.is_spam;
            const confidence = data.confidence;
            const message = data.message;
            
            resultDiv.className = `result ${isSpam ? 'spam' : 'ham'}`;
            
            resultDiv.innerHTML = `
                <div class="result-icon">
                    ${isSpam ? '🚨' : '✅'}
                </div>
                <div class="result-title">
                    ${isSpam ? 'SPAM DETECTED!' : 'NOT SPAM'}
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${confidence}%"></div>
                </div>
                <div class="confidence-text">
                    Confidence: ${confidence}% - ${isSpam ? 'This appears to be spam' : 'This appears to be legitimate'}
                </div>
                <div class="message-preview">
                    <div class="message-preview-label">📨 Analyzed Message:</div>
                    <div class="message-preview-text">"${escapeHtml(message)}"</div>
                </div>
            `;
            
            resultDiv.style.display = 'block';
            
            // Scroll to result
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `⚠️ ${message}`;
            errorDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function setExample(text) {
            document.getElementById('message').value = text;
            document.getElementById('message').focus();
            // Optional: Auto-detect
            // detectSpam();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Allow Enter key to submit (Ctrl+Enter)
        document.getElementById('message').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                detectSpam();
            }
        });
        
        // Auto-resize textarea
        const textarea = document.getElementById('message');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });
    </script>
</body>
</html>
